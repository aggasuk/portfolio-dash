name: Update Portfolio Prices (Bloomberg)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Bloomberg prices
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python portfolio_prices.py

      - name: Commit updated prices
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio_prices.json nav_history.json
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Bloomberg enrichment $(Get-Date -Format 'yyyy-MM-ddTHH:mm')"
            git push
          } else {
            Write-Host "No price changes to commit"
          }
