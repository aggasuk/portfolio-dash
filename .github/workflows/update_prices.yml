name: Update Portfolio Prices (Bloomberg)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Bloomberg prices
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python portfolio_prices.py

      - name: Commit updated prices
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio_prices.json nav_history.json
          git diff --staged --quiet || git commit -m "Bloomberg enrichment $(date +%Y-%m-%dT%H:%M)"
          git push
